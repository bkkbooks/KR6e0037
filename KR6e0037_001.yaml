body:
  text: 大唐三藏法師玄奘譯如是我聞一時薄伽梵在摩揭陀國間寂法林坐妙菩提金剛堅固無量妙寶共所莊嚴紅蓮華臺師子座上與十不可說俱胝那庾多百千佛土極微塵數大菩薩俱及諸天人阿素洛等無量大衆前後圍繞爾時會中有一菩薩摩訶薩名不可思議光王承佛威神從坐而起頂禮佛足合掌恭敬而白佛言世尊諸佛國土時分莊嚴有勝劣不佛言善男子我此索訶世界釋迦牟尼佛土一劫於極樂世界無量光佛土為一晝夜極樂世界一劫於袈裟幢世界金剛堅固歡喜佛土為一晝夜袈裟幢世界一劫於不退輪音世界極妙圓滿紅蓮敷身佛土為一晝夜不退輪音世界一劫於絶塵世界法幢佛土為一晝夜絶塵世界一劫於明燈世界師子佛土為一晝夜明燈世界一劫於妙光世界遍照佛土為一晝夜妙光世界一劫於難超世界身放法光佛土為一晝夜難超世界一劫於莊嚴世界一切神通慧光王佛土為一晝夜莊嚴世界一劫於鏡輪世界月覺佛土為一晝夜善男子如是世界展轉漸增滿十不可說俱胝那庾多百千佛土極微塵數世界佛土最後世界佛土一劫於蓮華德世界賢德佛土為一晝夜於彼世界諸菩薩衆修治殊勝普賢行地善男子如諸世界晝夜漸增如是諸佛壽量身相菩薩世界莊嚴亦爾由彼有情福轉增故若有善男子善女人聞此顯示無邊佛土功德法門歡喜信重受持讀誦如理思惟廣為他說臨命終時十方佛土無量諸佛皆現其前慰喻讚美令其增進無量善根隨願往生諸佛淨國乃至無上正等菩提於生生中常憶宿命修菩薩行速得圓滿時薄伽梵說此經已不可思議光王菩薩摩訶薩并諸天人阿素洛等一切衆會聞佛所說皆大歡喜信受奉行
